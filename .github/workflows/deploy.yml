name: Deploy to production

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          port: 21
          # Adjust if your site lives somewhere other than public_html.
          # Examples: ./public_html/  |  ./public_html/laceyguthrie.com/  |  ./
          server-dir: ./public_html/
          # Only upload changed files (default behavior — keeps deploys fast).
          # Files matching these patterns won't be uploaded:
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/.DS_Store
            **/_drop/**
            **/node_modules/**
            convert-images.sh
            README.md
